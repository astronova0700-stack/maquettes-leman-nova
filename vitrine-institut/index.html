<style id="booking-modal-styles">
.booking-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 9999;
  display: none;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.booking-modal-overlay.open {
  display: flex;
  opacity: 1;
}
.booking-modal {
  background: hsl(35 30% 97%);
  color: hsl(25 15% 15%);
  border-radius: 1.5rem 1.5rem 0 0;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  box-shadow: 0 -25px 80px -12px rgba(0,0,0,0.25);
  transform: translateY(20px);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
@media (min-width: 640px) {
  .booking-modal-overlay { align-items: center; padding: 1rem; }
  .booking-modal { border-radius: 1.5rem; transform: scale(0.95) translateY(20px); }
  .booking-modal-overlay.open .booking-modal { transform: scale(1) translateY(0); }
}
.booking-modal-overlay.open .booking-modal {
  transform: translateY(0);
}
.booking-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid hsl(35 20% 88%);
  flex-shrink: 0;
}
.booking-modal-header h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 500;
  margin: 0;
}
.booking-modal-close {
  width: 2.5rem;
  height: 2.5rem;
  border-radius: 50%;
  border: none;
  background: hsl(35 15% 92%);
  color: hsl(25 15% 15%);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s ease;
}
.booking-modal-close:hover { background: hsl(35 20% 88%); }
.booking-modal-body {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 1.5rem;
  -webkit-overflow-scrolling: touch;
}
.booking-modal-footer {
  flex-shrink: 0;
  padding: 1rem 1.5rem;
  border-top: 1px solid hsl(35 20% 88%);
  background: hsl(35 30% 97%);
}
.booking-step { display: none; }
.booking-step.active { display: block; animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.booking-option {
  display: flex;
  align-items: center;
  gap: 1rem;
  width: 100%;
  padding: 1rem;
  margin-bottom: 0.75rem;
  background: hsl(35 25% 95%);
  border: 1px solid hsl(35 20% 88%);
  border-radius: 1rem;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s ease;
  font-family: 'Raleway', sans-serif;
}
.booking-option:hover { border-color: hsl(145 25% 38% / 0.5); }
.booking-option.selected {
  border-color: hsl(145 25% 38%);
  background: hsl(145 25% 38% / 0.08);
}
.booking-option .checkbox {
  width: 1.25rem;
  height: 1.25rem;
  border-radius: 0.35rem;
  border: 2px solid hsl(35 20% 75%);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s ease;
}
.booking-option.selected .checkbox {
  background: hsl(145 25% 38%);
  border-color: hsl(145 25% 38%);
}
.booking-option .info { flex: 1; }
.booking-option .name { display: block; font-weight: 600; color: hsl(25 15% 15%); }
.booking-option .meta { display: block; font-size: 0.8rem; color: hsl(25 10% 45%); margin-top: 0.15rem; }
.booking-option .price { font-weight: 700; color: hsl(145 25% 38%); white-space: nowrap; }
.booking-recap-box {
  background: hsl(35 25% 95%);
  border: 1px solid hsl(35 20% 88%);
  border-radius: 1rem;
  padding: 1.25rem;
  margin-bottom: 1.25rem;
}
.booking-recap-box .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: hsl(25 10% 45%); margin-bottom: 0.75rem; }
.booking-recap-box ul { list-style: none; padding: 0; margin: 0 0 1rem 0; }
.booking-recap-box li {
  display: flex;
  justify-content: space-between;
  padding: 0.5rem 0;
  border-bottom: 1px solid hsl(35 20% 88%);
  font-size: 0.95rem;
}
.booking-recap-box li:last-child { border-bottom: none; }
.booking-recap-box .booking-total-row {
  display: flex;
  justify-content: space-between;
  font-weight: 700;
  padding-top: 0.75rem;
  border-top: 2px solid hsl(35 20% 88%);
  color: hsl(145 25% 38%);
}
.booking-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
.booking-actions button, .booking-actions a {
  padding: 0.85rem 1.5rem;
  border-radius: 9999px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  border: none;
  transition: all 0.2s ease;
}
.booking-btn-primary {
  background: hsl(145 25% 38%);
  color: #fff;
  box-shadow: 0 0 20px hsl(145 25% 38% / 0.25);
}
.booking-btn-primary:hover { background: hsl(145 25% 32%); }
.booking-btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.booking-btn-secondary {
  background: transparent;
  color: hsl(25 15% 15%);
  border: 1px solid hsl(35 20% 75%) !important;
}
.booking-btn-secondary:hover { border-color: hsl(145 25% 38%) !important; color: hsl(145 25% 38%); }
.booking-fallback { display: none; }
.no-js .booking-step { display: block; }
.no-js .booking-fallback { display: block; margin-top: 1rem; }
.no-js .booking-actions { display: none; }
.booking-form-field {
  margin-bottom: 1rem;
}
.booking-form-field label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 0.35rem;
  color: hsl(25 10% 35%);
}
.booking-form-field input,
.booking-form-field textarea,
.booking-form-field select {
  width: 100%;
  padding: 0.75rem 1rem;
  border-radius: 0.75rem;
  border: 1px solid hsl(35 20% 85%);
  background: #fff;
  font-family: 'Raleway', sans-serif;
  font-size: 0.95rem;
  color: hsl(25 15% 15%);
}
.booking-form-field textarea { min-height: 100px; resize: vertical; }
</style>

<script>
(function() {
  'use strict';
  var modal = document.getElementById('booking-modal');
  if (!modal) return;
  var closeBtn = document.getElementById('booking-modal-close');
  var step1 = document.getElementById('booking-step-1');
  var step2 = document.getElementById('booking-step-2');
  var actions1 = document.getElementById('booking-actions-step-1');
  var actions2 = document.getElementById('booking-actions-step-2');
  var btnNext = document.getElementById('booking-btn-next');
  var btnBack = document.getElementById('booking-btn-back');
  var btnCancel = document.getElementById('booking-btn-cancel');
  var options = modal.querySelectorAll('.booking-option');
  var recapServices = document.getElementById('booking-recap-services');
  var recapTotal = document.getElementById('booking-recap-total');
  var recapDuration = document.getElementById('booking-recap-duration');
  var confirmLink = document.getElementById('booking-confirm-link');
  var selected = [];

  function parsePrice(str) {
    if (/dès|variable|sur devis/i.test(str)) return null;
    var cleaned = str.replace(/\s/g,'').replace(/,/g,'.').replace(/[^\d.]/g,'');
    return cleaned ? parseFloat(cleaned) : null;
  }
  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDuration(mins) {
    var h = Math.floor(mins/60), m = mins%60;
    if (m===0) return h+'h00';
    return h+'h'+(m<10?'0'+m:m);
  }
  function updateNext() { btnNext.disabled = selected.length === 0; }
  function toggleOption(opt) {
    var val = opt.dataset.value;
    var idx = selected.findIndex(function(s){ return s.value === val; });
    if (idx >= 0) {
      selected.splice(idx,1);
      opt.classList.remove('selected');
      opt.setAttribute('aria-checked','false');
    } else {
      selected.push({value:val, price:opt.dataset.price, duration:opt.dataset.duration, minutes:parseInt(opt.dataset.durationMinutes,10)||0});
      opt.classList.add('selected');
      opt.setAttribute('aria-checked','true');
    }
    updateNext();
  }
  function clearSelection() {
    selected = [];
    options.forEach(function(opt){ opt.classList.remove('selected'); opt.setAttribute('aria-checked','false'); });
    updateNext();
  }
  function preselect(val) {
    options.forEach(function(opt){ if(opt.dataset.value === val) toggleOption(opt); });
  }
  function showStep(n) {
    if (n === 1) {
      step1.classList.add('active'); step2.classList.remove('active');
      actions1.style.display = 'flex'; actions2.style.display = 'none';
    } else {
      step1.classList.remove('active'); step2.classList.add('active');
      actions1.style.display = 'none'; actions2.style.display = 'flex';
      buildRecap();
    }
  }
  function buildRecap() {
    recapServices.innerHTML = '';
    var total = 0, hasNum = false, totalMin = 0;
    if (selected.length === 0) {
      recapServices.innerHTML = '<li style="color:hsl(25 10% 45%);">Aucune prestation sélectionnée</li>';
      recapTotal.textContent = '—'; recapDuration.textContent = '—';
      confirmLink.href = 'https://cal.com/leman-nova-0zwvun/rendez-vous-15-minutes';
      return;
    }
    selected.forEach(function(s) {
      var p = parsePrice(s.price);
      var priceDisp = p !== null ? p.toFixed(0)+'€' : escapeHtml(s.price);
      var li = document.createElement('li');
      li.innerHTML = '<span>'+escapeHtml(s.value)+'<br><span style="font-size:0.8rem;color:hsl(25 10% 45%);">'+escapeHtml(s.duration)+'</span></span><span>'+priceDisp+'</span>';
      recapServices.appendChild(li);
      if (p !== null) { total += p; hasNum = true; }
      totalMin += s.minutes || 0;
    });
    recapTotal.textContent = hasNum ? total.toFixed(0)+'€' : 'Sur devis';
    recapDuration.textContent = fmtDuration(totalMin);
    var names = selected.map(function(s){ return s.value; }).join(',');
    confirmLink.href = 'https://cal.com/leman-nova-0zwvun/rendez-vous-15-minutes?services='+encodeURIComponent(names)+'&duration='+encodeURIComponent(String(totalMin));
  }
  function openModal(pre) {
    clearSelection();
    showStep(1);
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    if (pre) preselect(pre);
  }
  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }
  options.forEach(function(opt){ opt.addEventListener('click', function(){ toggleOption(opt); }); });
  btnNext.addEventListener('click', function(){ if (selected.length) showStep(2); });
  btnBack.addEventListener('click', function(){ showStep(1); });
  btnCancel.addEventListener('click', closeModal);
  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', function(e){ if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

  // Global hooks for React-rendered buttons
  window.openBookingModal = openModal;
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('a, button');
    if (!btn) return;
    var text = (btn.textContent || '').trim().toLowerCase();
    var isBook = /réserver|réservation|rendez-vous|creneau|créneau/.test(text);
    if (!isBook) return;
    e.preventDefault();
    var pre = null;
    var card = btn.closest('[class*="card"], [class*="package"], [class*="treatment"]');
    if (card) {
      var h3 = card.querySelector('h3');
      if (h3) pre = h3.textContent.trim();
    }
    openModal(pre);
  });
})();
</script>
