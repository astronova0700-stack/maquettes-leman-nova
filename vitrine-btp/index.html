  backdrop-filter: blur(10px);

  z-index: 9999;
  display: none;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.booking-modal-overlay.open {

.booking-modal {
  background: hsl(35 30% 97%);
  color: hsl(25 15% 15%);
  border-radius: 1.5rem 1.5rem 0 0;
  width: 100%;

  max-height: 90vh;

  transform: translateY(20px);

  flex-direction: column;
  overflow: hidden;

<div class="booking-modal-overlay" id="booking-modal" role="dialog" aria-modal="true" aria-labelledby="booking-modal-title">
  <div class="booking-modal" role="document">
    <div class="booking-modal-header">
      <h3 id="booking-modal-title">Demander un devis</h3>
      <button class="booking-modal-close" id="booking-modal-close" aria-label="Fermer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="booking-modal-body">
      <p style="color:hsl(25 10% 45%);margin-bottom:1.25rem;">Décrivez votre projet de construction ou rénovation. Nous vous rappelons sous 24h.</p>
      <div class="booking-form-field">
        <label for="btp-type">Type de projet</label>
        <select id="btp-type">
          <option>Construction neuve</option>
          <option>Rénovation</option>
          <option>Extension</option>
          <option>Gros œuvre</option>
          <option>Autre</option>
        </select>
      </div>
      <div class="booking-form-field">
        <label for="btp-desc">Description du projet</label>
        <textarea id="btp-desc" placeholder="Surface, localisation, délais souhaités..."></textarea>
      </div>
      <div class="booking-form-field">
        <label for="btp-name">Nom</label>
        <input type="text" id="btp-name" placeholder="Votre nom">
      </div>
      <div class="booking-form-field">
        <label for="btp-phone">Téléphone</label>
        <input type="tel" id="btp-phone" placeholder="06 12 34 56 78">
      </div>
      <div class="booking-form-field">
        <label for="btp-email">Email</label>
        <input type="email" id="btp-email" placeholder="votre@email.com">
      </div>
      <noscript>
        <p class="booking-fallback"><a href="https://cal.com/leman-nova-0zwvun/rendez-vous-15-minutes" class="booking-btn-primary" target="_blank" rel="noopener noreferrer">Prendre rendez-vous en ligne</a></p>
      </noscript>
    </div>
    <div class="booking-modal-footer">
      <div class="booking-actions" id="booking-actions-step-1">
        <button class="booking-btn-secondary" id="booking-btn-cancel">Annuler</button>
        <a href="https://cal.com/leman-nova-0zwvun/rendez-vous-15-minutes" target="_blank" rel="noopener noreferrer" class="booking-btn-primary" id="booking-confirm-link">Prendre rendez-vous</a>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  var modal = document.getElementById('booking-modal');
  if (!modal) return;
  var closeBtn = document.getElementById('booking-modal-close');
  var btnCancel = document.getElementById('booking-btn-cancel');
  var confirmLink = document.getElementById('booking-confirm-link');
  var typeSel = document.getElementById('btp-type');
  var desc = document.getElementById('btp-desc');
  var name = document.getElementById('btp-name');
  var phone = document.getElementById('btp-phone');
  var email = document.getElementById('btp-email');
  function updateLink() {
    var params = new URLSearchParams();
    params.set('type', typeSel.value);
    if (desc.value) params.set('description', desc.value);
    if (name.value) params.set('name', name.value);
    if (phone.value) params.set('phone', phone.value);
    if (email.value) params.set('email', email.value);
    confirmLink.href = 'https://cal.com/leman-nova-0zwvun/rendez-vous-15-minutes?' + params.toString();
  }
  [typeSel, desc, name, phone, email].forEach(function(el) {
    el.addEventListener('input', updateLink);
  });
  function openModal() {
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLink();
  }
  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }
  closeBtn.addEventListener('click', closeModal);
  btnCancel.addEventListener('click', closeModal);
  modal.addEventListener('click', function(e){ if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });
  window.openBookingModal = openModal;
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('a, button');
    if (!btn) return;
    var text = (btn.textContent || '').trim().toLowerCase();
    var isBook = /devis|rendez-vous|contact|rdv/.test(text);
    if (!isBook) return;
    e.preventDefault();
    openModal();
  });
})();
</script>
